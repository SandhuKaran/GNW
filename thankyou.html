<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Greenworks Landscaping</title>

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-WVHBF97C');</script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="new.css" />
    <link rel="stylesheet" href="style2.css" />

    <style>
        :root {
            --primary-color: #1b5e20;
            --accent-color: #4CAF50; 
            --text-dark: #222;
            --text-light: #666;
            --bg-light: #f9f9f9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #fff;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .logo img { height: 45px; width: auto; display: block; }

        /* --- THANK YOU MESSAGE STYLES --- */
        .thank-you-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .thank-you-card {
            background: #fff;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 600px;
            width: 100%;
            border-top: 6px solid var(--accent-color);
        }

        .success-icon {
            font-size: 5rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease-out;
        }

        .thank-you-card h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .thank-you-card p {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            background: var(--primary-color);
            color: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.3s, transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-home:hover {
            background: var(--accent-color);
            transform: translateY(-3px);
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        footer {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WVHBF97C"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <header>
        <div class="logo">
            <a href="/">
                <img src="assets/img/logo-light.png" alt="Greenworks Logo"> 
            </a>
        </div>
        <a href="/" class="btn-home" style="padding: 10px 25px; font-size: 0.9rem;">Return to Site</a>
    </header>

    <div class="thank-you-container">
        <div class="thank-you-card">
            <i class="fas fa-check-circle success-icon"></i>
            <h1>Thank You!</h1>
            <p>Your message has been successfully sent. A member of the Greenworks team will review your project details and get back to you shortly!</p>
            <a href="/" class="btn-home">Back to Homepage</a>
        </div>
    </div>

    <footer>
        <p>Copyright © <span id="year"></span> | Greenworks Construction and Companies Inc. | All Rights Reserved.</p>
    </footer>

    <script>
        document.getElementById("year").innerHTML = new Date().getFullYear();
    </script>
</body>
</html>
